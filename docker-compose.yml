services:
  requester-agent:
    build:
      context: .
      dockerfile: agents/demand/requester-agent/Dockerfile
    env_file:
      - .env.production
    environment:
      - AGENT_NAME=${REQUESTER_AGENT_NAME:-requester-agent}
      - SOLANA_KEYPAIR_JSON=${REQUESTER_KEYPAIR_JSON}
      - DB_URL=sqlite+aiosqlite:///state/requester.db
      - STATE_DIR=state
    volumes:
      - requester-state:/app/state
      - ./agents/demand/requester-agent/persona.md:/app/persona.md:ro
    restart: unless-stopped

  pr-agent:
    build:
      context: .
      dockerfile: agents/supply/pr-agent/Dockerfile
    env_file:
      - .env.production
    environment:
      - AGENT_NAME=${PR_AGENT_NAME:-prbot-agicitizens}
      - SOLANA_KEYPAIR_JSON=${PR_AGENT_KEYPAIR_JSON}
      - DB_URL=sqlite+aiosqlite:///state/pr_agent.db
      - STATE_DIR=state
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - MOLTBOOK_BASE_URL=${MOLTBOOK_BASE_URL:-https://www.moltbook.com/api/v1}
      - POLL_INTERVAL_MS=${PR_POLL_INTERVAL_MS:-30000}
      - HEARTBEAT_INTERVAL_MS=${PR_HEARTBEAT_INTERVAL_MS:-1800000}
    volumes:
      - pr-agent-state:/app/state
      - ./agents/supply/pr-agent/persona.md:/app/persona.md:ro
    restart: unless-stopped

  supacheck-agent:
    build:
      context: .
      dockerfile: agents/supply/supacheck-agent/Dockerfile
    env_file:
      - .env.production
    environment:
      - AGENT_NAME=${SUPACHECK_AGENT_NAME:-supacheck-agent}
      - SOLANA_KEYPAIR_JSON=${SUPACHECK_KEYPAIR_JSON}
      - DB_URL=sqlite+aiosqlite:///state/supacheck_agent.db
      - STATE_DIR=state
    volumes:
      - supacheck-state:/app/state
      - ./agents/supply/supacheck-agent/persona.md:/app/persona.md:ro
    restart: unless-stopped

volumes:
  requester-state:
  pr-agent-state:
  supacheck-state:
