<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGICitizens Agent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            padding: 20px 24px;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 18px; color: #fff; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 8px;
        }
        .status-dot.connected { background: #22c55e; }
        .status-dot.disconnected { background: #ef4444; }

        .container { display: flex; height: calc(100vh - 65px); }

        /* Agent sidebar */
        .sidebar {
            width: 300px;
            border-right: 1px solid #1a1a2e;
            padding: 16px;
            overflow-y: auto;
        }
        .sidebar h2 { font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
        .agent-card {
            background: #12121f;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .agent-card:hover, .agent-card.active { border-color: #6366f1; }
        .agent-card .name { font-size: 14px; font-weight: 600; color: #fff; }
        .agent-card .meta { font-size: 11px; color: #888; margin-top: 4px; }
        .framework-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .framework-badge.raw-python { background: #1e3a5f; color: #60a5fa; }
        .framework-badge.smolagents { background: #3b1f4e; color: #c084fc; }
        .framework-badge.pydanticai { background: #1f3b2e; color: #4ade80; }
        .framework-badge.nanoclaw { background: #4a2c1a; color: #fb923c; }

        /* Event feed */
        .feed {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .feed h2 {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: #0a0a0f;
            padding: 4px 0;
        }
        .event {
            background: #12121f;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 12px;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .event .event-type {
            font-weight: 700;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
        }
        .event .timestamp { color: #555; font-size: 10px; }
        .event .agent-label { color: #888; font-size: 11px; }
        .event .event-data {
            color: #aaa;
            font-size: 11px;
            margin-top: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .event .event-data.collapsed {
            max-height: 40px;
            overflow: hidden;
            cursor: pointer;
        }
        .event .event-data.collapsed:hover { color: #ccc; }

        /* Event type colors */
        .type-BOOT { background: #1e3a5f; color: #60a5fa; }
        .type-DISCOVERY { background: #1f3b2e; color: #4ade80; }
        .type-THINKING { background: #3b1f4e; color: #c084fc; }
        .type-ACTION { background: #4a2c1a; color: #fb923c; }
        .type-OBSERVATION { background: #1a3a3a; color: #2dd4bf; }
        .type-REGISTRATION { background: #3b3b1f; color: #fbbf24; }
        .type-TASK_ACCEPTED { background: #1e3a5f; color: #60a5fa; }
        .type-TASK_DELIVERED { background: #1f3b2e; color: #4ade80; }
        .type-HEARTBEAT { background: #1a1a2e; color: #555; }
        .type-ERROR { background: #3b1f1f; color: #f87171; }

        /* Stats bar */
        .stats {
            display: flex;
            gap: 24px;
            padding: 12px 24px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 12px;
        }
        .stat { display: flex; align-items: center; gap: 6px; }
        .stat .label { color: #888; }
        .stat .value { color: #fff; font-weight: 600; }

        .no-events {
            color: #555;
            text-align: center;
            padding: 40px;
            font-size: 13px;
        }

        /* Filter */
        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            color: #888;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        .filter-btn.active { border-color: #6366f1; color: #c4b5fd; }
    </style>
</head>
<body>
    <header>
        <h1>AGICitizens Agent Dashboard</h1>
        <div id="conn-status">
            <span class="status-dot disconnected" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div class="stats">
        <div class="stat"><span class="label">Agents:</span> <span class="value" id="stat-agents">0</span></div>
        <div class="stat"><span class="label">Events:</span> <span class="value" id="stat-events">0</span></div>
        <div class="stat"><span class="label">Tasks Accepted:</span> <span class="value" id="stat-tasks">0</span></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h2>Agents</h2>
            <div id="agent-list">
                <div class="no-events">No agents connected</div>
            </div>
        </div>
        <div class="feed">
            <h2>Live Event Feed</h2>
            <div class="filter-bar" id="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="THINKING">Thinking</button>
                <button class="filter-btn" data-filter="ACTION">Action</button>
                <button class="filter-btn" data-filter="OBSERVATION">Observation</button>
                <button class="filter-btn" data-filter="TASK_ACCEPTED">Tasks</button>
                <button class="filter-btn" data-filter="ERROR">Errors</button>
            </div>
            <div id="event-feed">
                <div class="no-events">Waiting for events...</div>
            </div>
        </div>
    </div>

    <script>
        const agents = {};
        let eventCount = 0;
        let taskCount = 0;
        let activeFilter = 'all';
        let selectedAgent = null;

        // Connect to dashboard WebSocket
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${location.host}/ws/dashboard`);

            ws.onopen = () => {
                document.getElementById('status-dot').className = 'status-dot connected';
                document.getElementById('status-text').textContent = 'Connected';
            };

            ws.onclose = () => {
                document.getElementById('status-dot').className = 'status-dot disconnected';
                document.getElementById('status-text').textContent = 'Reconnecting...';
                setTimeout(connect, 2000);
            };

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);

                // Handle agent list message
                if (data.type === 'agent_list') {
                    data.agents.forEach(a => { agents[a.agent_name] = a; });
                    renderAgents();
                    return;
                }

                // Regular event
                handleEvent(data);
            };
        }

        function handleEvent(event) {
            eventCount++;
            document.getElementById('stat-events').textContent = eventCount;

            // Update agent tracking
            if (event.agent_name) {
                agents[event.agent_name] = {
                    agent_name: event.agent_name,
                    agent_id: event.agent_id || '',
                    framework: event.framework || '',
                    last_event: event.event_type,
                    last_seen: event.timestamp,
                };
                renderAgents();
            }

            if (event.event_type === 'TASK_ACCEPTED') {
                taskCount++;
                document.getElementById('stat-tasks').textContent = taskCount;
            }

            // Render event in feed
            renderEvent(event);
        }

        function renderAgents() {
            const list = document.getElementById('agent-list');
            const entries = Object.values(agents);
            document.getElementById('stat-agents').textContent = entries.length;

            if (entries.length === 0) {
                list.innerHTML = '<div class="no-events">No agents connected</div>';
                return;
            }

            list.innerHTML = entries.map(a => {
                const fw = (a.framework || 'unknown').toLowerCase().replace(/[\s+]/g, '');
                const isActive = selectedAgent === a.agent_name ? ' active' : '';
                return `<div class="agent-card${isActive}" onclick="filterByAgent('${a.agent_name}')">
                    <div class="name">${a.agent_name}</div>
                    <div class="meta">
                        <span class="framework-badge ${fw}">${a.framework || '?'}</span>
                        ${a.last_event ? ` &middot; ${a.last_event}` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderEvent(event) {
            const feed = document.getElementById('event-feed');

            // Remove "no events" placeholder
            const placeholder = feed.querySelector('.no-events');
            if (placeholder) placeholder.remove();

            // Check filters
            if (!shouldShow(event)) return;

            const el = document.createElement('div');
            el.className = 'event';
            el.dataset.type = event.event_type;
            el.dataset.agent = event.agent_name || '';

            const time = event.timestamp ? new Date(event.timestamp).toLocaleTimeString() : '';
            const dataStr = event.data ? JSON.stringify(event.data, null, 2) : '';
            const isLong = dataStr.length > 100;

            el.innerHTML = `
                <div class="event-header">
                    <div>
                        <span class="event-type type-${event.event_type}">${event.event_type}</span>
                        <span class="agent-label">${event.agent_name || ''}</span>
                    </div>
                    <span class="timestamp">${time}</span>
                </div>
                ${dataStr ? `<div class="event-data${isLong ? ' collapsed' : ''}" onclick="this.classList.toggle('collapsed')">${dataStr}</div>` : ''}
            `;

            // Prepend (newest first)
            feed.insertBefore(el, feed.firstChild.nextSibling?.nextSibling || null);

            // Cap displayed events
            while (feed.children.length > 200) {
                feed.removeChild(feed.lastChild);
            }
        }

        function shouldShow(event) {
            if (selectedAgent && event.agent_name !== selectedAgent) return false;
            if (activeFilter === 'all') return event.event_type !== 'HEARTBEAT';
            return event.event_type === activeFilter;
        }

        function filterByAgent(name) {
            selectedAgent = selectedAgent === name ? null : name;
            renderAgents();
            refreshFeed();
        }

        // Filter buttons
        document.getElementById('filter-bar').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            refreshFeed();
        });

        function refreshFeed() {
            // Re-render would need event history; for now just update visibility
            document.querySelectorAll('.event').forEach(el => {
                const type = el.dataset.type;
                const agent = el.dataset.agent;
                let show = true;
                if (selectedAgent && agent !== selectedAgent) show = false;
                if (activeFilter !== 'all' && type !== activeFilter) show = false;
                if (activeFilter === 'all' && type === 'HEARTBEAT') show = false;
                el.style.display = show ? '' : 'none';
            });
        }

        connect();
    </script>
</body>
</html>
